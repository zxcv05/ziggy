name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: run tests
        run: zig build test

      - name: build release
        run: zig build -Doptimize=ReleaseFast
